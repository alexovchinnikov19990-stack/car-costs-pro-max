<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Car Costs PRO</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/styles.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
<h1>Car Costs PRO</h1>
</header>

<nav>
<button onclick="showTab('dashboard')">Dashboard</button>
<button onclick="showTab('fuel')">Fuel</button>
<button onclick="showTab('service')">Service</button>
<button onclick="showTab('other')">Other</button>
<button onclick="showTab('analytics')">Analytics</button>
</nav>

<section id="dashboard" class="tab active">

<h2>Итоги</h2>

<div class="cards">

<div class="card">
<h3>Общие расходы</h3>
<p id="totalCost">0</p>
</div>

<div class="card">
<h3>Стоимость за км</h3>
<p id="costPerKm">0</p>
</div>

<div class="card">
<h3>Топливо</h3>
<p id="fuelCost">0</p>
</div>

<div class="card">
<h3>Сервис</h3>
<p id="serviceCost">0</p>
</div>

</div>

</section>

<section id="fuel" class="tab">

<h2>Топливо</h2>

<button onclick="addFuel()">Добавить</button>

<table id="fuelTable">
<thead>
<tr>
<th>Дата</th>
<th>Литры</th>
<th>Цена</th>
<th>Сумма</th>
</tr>
</thead>

<tbody></tbody>

</table>

</section>

<section id="service" class="tab">

<h2>Сервис</h2>

<button onclick="addService()">Добавить</button>

<table id="serviceTable">

<thead>
<tr>
<th>Дата</th>
<th>Описание</th>
<th>Цена</th>
</tr>
</thead>

<tbody></tbody>

</table>

</section>

<section id="other" class="tab">

<h2>Прочие расходы</h2>

<button onclick="addOther()">Добавить</button>

<table id="otherTable">

<thead>
<tr>
<th>Дата</th>
<th>Описание</th>
<th>Цена</th>
</tr>
</thead>

<tbody></tbody>

</table>

</section>

<section id="analytics" class="tab">

<h2>Аналитика</h2>

<canvas id="costChart"></canvas>

</section>

<script src="state/state.js"></script>
<script src="js/storage.js"></script>
<script src="js/calculations.js"></script>
<script src="js/charts.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
