<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Costs PRO MAX</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<meta name="theme-color" content="#0a84ff">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
  <img src="icon-192.png" alt="X50" class="header-icon">
  <h1>Car Costs <span>PRO MAX</span></h1>
</header>

<nav>
  <button onclick="App.show('dashboard')" data-page="dashboard">🏠 Дашборд</button>
  <button onclick="App.show('fuel')"      data-page="fuel">⛽ Топливо</button>
  <button onclick="App.show('service')"   data-page="service">🔧 Сервис</button>
  <button onclick="App.show('mileage')"   data-page="mileage">📍 Пробег</button>
  <button onclick="App.show('costs')"     data-page="costs">💳 Прочее</button>
  <button onclick="App.show('analytics')" data-page="analytics">📊 Аналитика</button>
  <button onclick="Export.backup()"       class="backup-btn">💾 Backup</button>
</nav>

<main>

<!-- DASHBOARD -->
<section id="dashboard" class="page">
  <div class="page-bg" style="background-image:url('https://belgee.by/storage/thumbs/car_models/2/w1920_h1080_ghahrtympxsj0nal6uwr.png')"></div>
  <div class="page-content">
    <h2>Общая статистика</h2>
    <div class="cards">
      <div class="card"><h3>Общие расходы</h3><p id="totalCost">0 ₽</p></div>
      <div class="card"><h3>Стоимость км</h3><p id="costPerKm">0 ₽</p></div>
      <div class="card"><h3>Общий пробег</h3><p id="totalKm">0 км</p></div>
    </div>
  </div>
</section>

<!-- FUEL -->
<section id="fuel" class="page hidden">
  <div class="page-bg" style="background-image:url('https://belgee.by/storage/thumbs/car_models/2/w1200_h854_17380684411729161178dvigatel.png')"></div>
  <div class="page-content">
    <h2>⛽ Заправка</h2>
    <div class="form-card">
      <input id="fuelDate" type="date">
      <input id="fuelLiters" type="number" placeholder="Литры">
      <input id="fuelPrice" type="number" placeholder="Цена за литр">
      <input id="fuelMileage" type="number" placeholder="Пробег">
      <select id="fuelType">
        <option value="full">Полный бак</option>
        <option value="part">Частичная</option>
      </select>
      <button onclick="Fuel.add()">Добавить заправку</button>
    </div>
    <ul id="fuelList"></ul>
  </div>
</section>

<!-- SERVICE -->
<section id="service" class="page hidden">
  <div class="page-bg" style="background-image:url('https://belgee.by/storage/thumbs/car_models/2/w1760_h880_1738068441172916338322.jpg')"></div>
  <div class="page-content">
    <h2>🔧 Сервис</h2>
    <div class="form-card">
      <input id="serviceDate" type="date">
      <input id="serviceName" placeholder="Описание работы">
      <input id="serviceCost" type="number" placeholder="Стоимость">
      <input id="serviceMileage" type="number" placeholder="Пробег">
      <button onclick="Service.add()">Добавить запись</button>
    </div>
    <ul id="serviceList"></ul>
  </div>
</section>

<!-- MILEAGE -->
<section id="mileage" class="page hidden">
  <div class="page-bg" style="background-image:url('https://belgee.by/storage/thumbs/car_models/2/w1920_h1070_1748238015no64-0927.png')"></div>
  <div class="page-content">
    <h2>📍 Пробег</h2>
    <div class="form-card">
      <input id="mileageDate" type="date">
      <input id="mileageValue" type="number" placeholder="Пробег (км)">
      <button onclick="Mileage.add()">Добавить запись</button>
    </div>
    <ul id="mileageList"></ul>
  </div>
</section>

<!-- COSTS -->
<section id="costs" class="page hidden">
  <div class="page-bg" style="background-image:url('https://belgee.by/storage/thumbs/car_models/2/w1920_h1070_17622583892.png')"></div>
  <div class="page-content">
    <h2>💳 Прочие расходы</h2>
    <div class="form-card">
      <input id="costDate" type="date">
      <input id="costName" placeholder="Тип расхода">
      <input id="costValue" type="number" placeholder="Сумма">
      <button onclick="Costs.add()">Добавить расход</button>
    </div>
    <ul id="costList"></ul>
  </div>
</section>

<!-- ANALYTICS -->
<section id="analytics" class="page hidden">
  <div class="page-bg" style="background-image:url('https://belgee.by/storage/thumbs/car_models/2/w1920_h1070_17622583892as-0641.jpg')"></div>
  <div class="page-content">
    <h2>📊 Аналитика</h2>
    <div class="chart-card">
      <h3>Структура расходов</h3>
      <canvas id="structureChart"></canvas>
    </div>
    <div class="chart-card">
      <h3>Топливо по месяцам</h3>
      <canvas id="fuelMonthlyChart"></canvas>
    </div>
  </div>
</section>

</main>

<script src="js/core/storage.js"></script>
<script src="js/core/app.js"></script>
<script src="js/modules/fuel.js"></script>
<script src="js/modules/service.js"></script>
<script src="js/modules/mileage.js"></script>
<script src="js/modules/costs.js"></script>
<script src="js/modules/analytics.js"></script>
<script src="js/modules/export.js"></script>

</body>
</html>
